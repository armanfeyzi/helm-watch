name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Build release binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/helm-watch-linux-amd64 ./cmd/helm-watch
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/helm-watch-linux-arm64 ./cmd/helm-watch

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint Helm chart
        run: helm lint ./deploy/helm-watch

      - name: Render Helm chart (template smoke)
        run: |
          set -euo pipefail
          helm template helm-watch ./deploy/helm-watch --namespace helm-watch >/dev/null
          helm template helm-watch ./deploy/helm-watch --namespace helm-watch \
            --set serviceMonitor.enabled=true \
            --set serviceMonitor.namespace=monitoring >/dev/null
          helm template helm-watch ./deploy/helm-watch --namespace helm-watch \
            --set-json 'config.repoOverrides={"vault":"https://helm.releases.hashicorp.com","redis":"oci://registry-1.docker.io/bitnamicharts"}' \
            >/dev/null

      - name: Package Helm chart
        run: helm package ./deploy/helm-watch --destination dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate checksums
        run: |
          cd dist
          sha256sum helm-watch-linux-amd64 helm-watch-linux-arm64 > checksums.txt

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/helm-watch-linux-amd64
            dist/helm-watch-linux-arm64
            dist/checksums.txt
            dist/helm-watch-*.tgz
