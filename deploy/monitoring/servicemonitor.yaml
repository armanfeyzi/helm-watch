# ServiceMonitor for Prometheus Operator.
#
# Prometheus only scrapes ServiceMonitors whose labels match the Prometheus CR
# .spec.serviceMonitorSelector. Discover yours with:
#   kubectl get prometheus -A -o jsonpath='{range .items[*]}{.metadata.namespace}{"\t"}{.metadata.name}{"\t"}{.spec.serviceMonitorSelector}{"\n"}{end}'
#
# This cluster uses: matchLabels release: prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: helm-watch
  namespace: monitoring
  labels:
    app.kubernetes.io/name: helm-watch
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
    - helm-watch
  selector:
    matchLabels:
      app.kubernetes.io/name: helm-watch
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true
