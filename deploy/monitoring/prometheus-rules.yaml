# Static bootstrap for clusters not using the Helm chart. For per-environment
# thresholds and namespace regexes, install the chart with
# `prometheusRule.enabled=true` and tune `prometheusRule.*` in values.yaml
# (see deploy/helm-watch/values.yaml).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: helm-watch-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: helm-watch
    release: prometheus
spec:
  groups:
    - name: helm-watch.rules
      rules:
        - alert: HelmWatchChartOutdated
          expr: helm_chart_outdated{namespace=~"prod|production"} > 0
          for: 15m
          labels:
            severity: warning
            component: helm-watch
          annotations:
            summary: "Helm chart outdated in production namespace"
            description: "Chart {{ $labels.chart }} for app {{ $labels.app }} in namespace {{ $labels.namespace }} is outdated."

        - alert: HelmWatchReconcileErrorsHigh
          expr: increase(helm_watch_reconcile_errors_total[10m]) > 3
          for: 5m
          labels:
            severity: critical
            component: helm-watch
          annotations:
            summary: "Helm Watch reconcile errors are increasing"
            description: "More than 3 reconcile errors in the last 10 minutes."

        - alert: HelmWatchMetricsMissing
          expr: absent(helm_chart_info)
          for: 10m
          labels:
            severity: warning
            component: helm-watch
          annotations:
            summary: "Helm Watch metrics missing"
            description: "No helm_chart_info metrics observed for 10 minutes."

        - alert: HelmWatchUnknownVersionRatioHigh
          expr: |
            (
              sum by (namespace) (helm_chart_unknown{namespace=~"prod|production"})
              /
              clamp_min(count by (namespace) (helm_chart_info{namespace=~"prod|production"}), 1)
            ) > 0.30
          for: 20m
          labels:
            severity: warning
            component: helm-watch
          annotations:
            summary: "High unknown chart version ratio"
            description: "Namespace {{ $labels.namespace }} has more than 30% unknown chart versions for 20 minutes."
