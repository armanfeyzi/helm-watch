replicaCount: 1

image:
  repository: ghcr.io/armanfeyzi/helm-watch
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  logLevel: info
  reconcileEvery: 1h
  repoCacheTTL: 5m
  # repoOverrides lets you fix charts that come back with `unknown` because the
  # discovered source is a Git repo or has no recorded URL. Keys are chart names
  # (case-insensitive). Values may be Helm repos (https://...) or OCI repos
  # (oci://...).
  repoOverrides: {}
    # vault: https://helm.releases.hashicorp.com
    # argocd-image-updater: https://argoproj.github.io/argo-helm
    # redis: oci://registry-1.docker.io/bitnamicharts

  # Kubernetes client rate limit (defaults reduce client-side throttling when
  # listing many Argo CD Applications). Tune if the API server complains.
  kubeClientQPS: 40
  kubeClientBurst: 80

  # Optional: mount registry credentials from an existing Secret (JSON body
  # matching HELM_WATCH_REGISTRY_CREDENTIALS). Prefer this over plain values.
  registryCredentialsSecret: ""
  registryCredentialsSecretKey: "registry-credentials.json"

serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s
  # Must be true so Prometheus keeps helm_chart_* `namespace` (workload target
  # ns). If false, kube SD overwrites it with the helm-watch pod namespace.
  honorLabels: true
  # Must match your Prometheus CR serviceMonitorSelector (kube-prometheus-stack: usually release: <prometheus-helm-release>).
  additionalLabels:
    release: prometheus

# PrometheusRule CR (requires Prometheus Operator). Use for tunable alerts;
# deploy/monitoring/prometheus-rules.yaml is a static bootstrap with the same defaults.
# If enabled, keep at least one of chartOutdated / reconcileErrors / metricsMissing /
# unknownVersionRatio enabled, or the rules list may be empty and fail to apply.
prometheusRule:
  enabled: false
  namespace: monitoring
  # Labels your Prometheus CR ruleSelector must match (kube-prometheus-stack often uses release: <release-name>).
  additionalLabels:
    release: prometheus

  chartOutdated:
    enabled: true
    # Regex for workload namespace on helm_chart_* metrics (Prometheus RE2).
    namespaceRegex: "prod|production"
    for: "15m"

  reconcileErrors:
    enabled: true
    increaseWindow: "10m"
    threshold: 3
    for: "5m"

  metricsMissing:
    enabled: true
    for: "10m"

  unknownVersionRatio:
    enabled: true
    namespaceRegex: "prod|production"
    # Alert when unknown_count / chart_count exceeds this ratio (0.30 = 30%).
    ratioThreshold: 0.30
    for: "20m"
