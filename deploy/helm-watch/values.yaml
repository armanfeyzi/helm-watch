replicaCount: 1

image:
  repository: ghcr.io/armanfeyzi/helm-watch
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

config:
  logLevel: info
  reconcileEvery: 1h
  repoCacheTTL: 5m
  # repoOverrides lets you fix charts that come back with `unknown` because the
  # discovered source is a Git repo or has no recorded URL. Keys are chart names
  # (case-insensitive). Values may be Helm repos (https://...) or OCI repos
  # (oci://...).
  repoOverrides: {}
    # vault: https://helm.releases.hashicorp.com
    # argocd-image-updater: https://argoproj.github.io/argo-helm
    # redis: oci://registry-1.docker.io/bitnamicharts

serviceMonitor:
  enabled: false
  namespace: monitoring
  interval: 30s
  scrapeTimeout: 10s
  # Must match your Prometheus CR serviceMonitorSelector (kube-prometheus-stack: usually release: <prometheus-helm-release>).
  additionalLabels:
    release: prometheus
